services:
  # MySQL
  mysql:
    image: mysql:8
    container_name: orderservice-mysql
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: orderservice
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - orderservice-network

  # Order Service Application
  # Uses Kafka from cartservice via vibevault-network (service name: kafka)
  orderservice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orderservice-app
    environment:
      PORT: 8083
      DB_URL: jdbc:mysql://mysql:3306/orderservice
      DB_USERNAME: root
      DB_PASSWORD: password
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ISSUER_URI: ${ISSUER_URI:-http://userservice:8081}
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - orderservice-network
      - vibevault-network

volumes:
  mysql_data:
    driver: local

networks:
  orderservice-network:
    driver: bridge
  vibevault-network:
    external: true
